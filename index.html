<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="description" content="Rndstorm — Random number generator with configurable odds">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rndstorm">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <title>Rndstorm</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="13,2 5,14 12,14 11,22 19,10 12,10" fill="currentColor"/>
        </svg>
        <span class="logo-text">Rndstorm</span>
      </div>
      <button id="install-btn" class="install-btn hidden" aria-label="Install Rndstorm app">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Install
      </button>
    </header>

    <!-- Number display is the main element -->
    <main class="result-section" role="status" aria-live="polite" aria-label="Generated number">
      <div id="result-number" class="result-number">—</div>
      <div id="result-context" class="result-context"></div>
    </main>

    <!-- Controls below -->
    <div class="controls">

      <section class="odds-selector" aria-label="Select odds">
        <div class="odds-pills" role="radiogroup" aria-label="Odds options"></div>
      </section>

      <div id="custom-panel" class="custom-panel hidden">
        <label for="custom-input">1 in <em>?</em> — enter your number:</label>
        <div class="custom-input-row">
          <input
            type="number"
            id="custom-input"
            min="2"
            max="999999999"
            placeholder="e.g. 50"
            inputmode="numeric"
            aria-label="Custom odds value"
          >
          <button id="custom-apply" class="btn-secondary">Set</button>
        </div>
      </div>

      <div class="roll-row">
        <button id="roll-btn" class="roll-btn" aria-label="Generate random number">
          <svg class="roll-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
            <polygon points="13,2 5,14 12,14 11,22 19,10 12,10" fill="currentColor"/>
          </svg>
          <span>ROLL</span>
        </button>
      </div>

      <div class="stats-row">
        <span id="stat-total" class="stat-count">0</span>
        <span class="stat-label">rolls</span>
        <button id="reset-stats" class="reset-btn" aria-label="Reset statistics and history">Reset</button>
      </div>

    </div>

    <section class="history-section" aria-label="Roll history">
      <button class="history-toggle" id="history-toggle" aria-expanded="false">
        <span>History</span>
        <span id="history-count" class="history-badge">0</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div id="history-list" class="history-list" role="list"></div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
